<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="screen">
    <main class="page-grid">
        <div class="page-panel">
            <h1>{{ title }}</h1>
            <p class="page-text">{{ subtitle }}</p>

            <div class="control-section">
                <button class="control-button on-button">An</button>
                <button class="control-button off-button">Aus</button>
            </div>

            <div class="ceiling-section">
                <section class="color-wheel-panel ceiling-color-panel" id="ceiling-color-panel" aria-labelledby="ceiling-color-label">
                    <div class="color-wheel-header">
                        <span id="ceiling-color-label" class="color-label">Farbe wählen</span>
                        <span class="color-mode-hint">Nur bei statischem Licht aktiv</span>
                    </div>
                    <div class="color-wheel-wrap">
                        <canvas id="ceiling-color-wheel" class="color-wheel" width="260" height="260" aria-label="DMX-Farbkreis"></canvas>
                        <div id="ceiling-color-selector" class="color-selector" aria-hidden="true"></div>
                    </div>
                    <div class="selected-color-row">
                        <span id="ceiling-color-preview" class="selected-color-preview"></span>
                        <span id="ceiling-color-value" class="selected-color-value">#ff0000 · RGB 255, 0, 0</span>
                    </div>
                </section>

                <section class="mode-section ceiling-controls" aria-labelledby="ceiling-mode-label">
                    <span id="ceiling-mode-label" class="mode-label">Modus</span>
                    <div class="mode-buttons">
                        <button class="mode-button active" data-mode="static">Statisches Licht</button>
                        <button class="mode-button" data-mode="slow_fade">Farbwechsel</button>
                        <button class="mode-button" data-mode="party">Partymodus</button>
                    </div>

                    <div class="dimmer-section ceiling-dimmer-section">
                        <label for="ceiling-dimmer-slider" class="dimmer-label">Master-Dimmer</label>
                        <input type="range" id="ceiling-dimmer-slider" min="0" max="100" value="50" class="dimmer-slider">
                        <span id="ceiling-dimmer-value" class="dimmer-value">50%</span>
                    </div>

                    <div class="dimmer-section ceiling-speed-section">
                        <label for="ceiling-speed-slider" class="dimmer-label">Geschwindigkeit</label>
                        <input type="range" id="ceiling-speed-slider" min="0" max="100" value="50" class="dimmer-slider">
                        <span id="ceiling-speed-value" class="dimmer-value">50%</span>
                    </div>
                </section>
            </div>

            <a href="{{ url_for('index') }}" class="small-button secondary-button">Zurück zur Startseite</a>
        </div>
    </main>

    <a href="{{ url_for('barlicht_decke_einstellungen') }}" class="settings-fab" aria-label="DMX Einstellungen" title="DMX Einstellungen">
        <span aria-hidden="true">&#128295;</span>
    </a>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const device = 'barlichtdecke';
    const wheel = document.getElementById('ceiling-color-wheel');
    const ctx = wheel.getContext('2d', { willReadFrequently: true });
    const selector = document.getElementById('ceiling-color-selector');
    const colorPanel = document.getElementById('ceiling-color-panel');
    const colorPreview = document.getElementById('ceiling-color-preview');
    const colorValue = document.getElementById('ceiling-color-value');
    const modeButtons = document.querySelectorAll('.mode-button');
    const dimmerSection = document.querySelector('.ceiling-dimmer-section');
    const dimmerSlider = document.getElementById('ceiling-dimmer-slider');
    const dimmerValue = document.getElementById('ceiling-dimmer-value');
    const speedSection = document.querySelector('.ceiling-speed-section');
    const speedSlider = document.getElementById('ceiling-speed-slider');
    const speedValue = document.getElementById('ceiling-speed-value');
    const onButton = document.querySelector('.on-button');
    const offButton = document.querySelector('.off-button');

    let currentMode = 'static';
    let currentColor = '#ff0000';
    let currentOn = false;
    let isDragging = false;

    function canPickColor() {
        return currentMode === 'static';
    }

    function usesSpeed(mode) {
        return mode === 'party' || mode === 'slow_fade';
    }

    function usesBrightness(mode) {
        return mode === 'static';
    }

    function updateModeControls(mode) {
        colorPanel.classList.toggle('disabled', !canPickColor());
        colorPanel.setAttribute('aria-disabled', !canPickColor());
        dimmerSection.classList.toggle('is-hidden', !usesBrightness(mode));
        dimmerSection.setAttribute('aria-hidden', !usesBrightness(mode));
        speedSection.classList.toggle('is-visible', usesSpeed(mode));
        speedSection.setAttribute('aria-hidden', !usesSpeed(mode));
    }

    function hsvToRgb(h, s, v) {
        const c = v * s;
        const x = c * (1 - Math.abs((h / 60) % 2 - 1));
        const m = v - c;
        let r = 0;
        let g = 0;
        let b = 0;

        if (h < 60) {
            r = c; g = x;
        } else if (h < 120) {
            r = x; g = c;
        } else if (h < 180) {
            g = c; b = x;
        } else if (h < 240) {
            g = x; b = c;
        } else if (h < 300) {
            r = x; b = c;
        } else {
            r = c; b = x;
        }

        return {
            r: Math.round((r + m) * 255),
            g: Math.round((g + m) * 255),
            b: Math.round((b + m) * 255)
        };
    }

    function rgbToHex(r, g, b) {
        return '#' + [r, g, b].map(value => value.toString(16).padStart(2, '0')).join('');
    }

    function hexToRgb(hex) {
        const value = hex.replace('#', '');
        return {
            r: parseInt(value.slice(0, 2), 16),
            g: parseInt(value.slice(2, 4), 16),
            b: parseInt(value.slice(4, 6), 16)
        };
    }

    function rgbToHsv(r, g, b) {
        r /= 255;
        g /= 255;
        b /= 255;

        const max = Math.max(r, g, b);
        const min = Math.min(r, g, b);
        const delta = max - min;
        let h = 0;

        if (delta !== 0) {
            if (max === r) {
                h = 60 * (((g - b) / delta) % 6);
            } else if (max === g) {
                h = 60 * ((b - r) / delta + 2);
            } else {
                h = 60 * ((r - g) / delta + 4);
            }
        }

        if (h < 0) {
            h += 360;
        }

        return {
            h,
            s: max === 0 ? 0 : delta / max
        };
    }

    function drawColorWheel() {
        const size = wheel.width;
        const radius = size / 2;
        const image = ctx.createImageData(size, size);

        for (let y = 0; y < size; y++) {
            for (let x = 0; x < size; x++) {
                const dx = x - radius;
                const dy = y - radius;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const offset = (y * size + x) * 4;

                if (distance <= radius) {
                    let hue = Math.atan2(dy, dx) * 180 / Math.PI;
                    if (hue < 0) {
                        hue += 360;
                    }
                    const saturation = distance / radius;
                    const rgb = hsvToRgb(hue, saturation, 1);
                    image.data[offset] = rgb.r;
                    image.data[offset + 1] = rgb.g;
                    image.data[offset + 2] = rgb.b;
                    image.data[offset + 3] = 255;
                } else {
                    image.data[offset + 3] = 0;
                }
            }
        }

        ctx.putImageData(image, 0, 0);
    }

    function setSelectorPosition(x, y) {
        selector.style.left = x + 'px';
        selector.style.top = y + 'px';
    }

    function setSelectorFromColor(hex) {
        const rgb = hexToRgb(hex);
        const hsv = rgbToHsv(rgb.r, rgb.g, rgb.b);
        const rect = wheel.getBoundingClientRect();
        const scale = rect.width / wheel.width;
        const radius = wheel.width / 2;
        const angle = hsv.h * Math.PI / 180;
        const distance = hsv.s * radius;
        const x = radius + Math.cos(angle) * distance;
        const y = radius + Math.sin(angle) * distance;

        setSelectorPosition(x * scale, y * scale);
    }

    function updateSelectedColor(hex, shouldSync = true) {
        const rgb = hexToRgb(hex);
        currentColor = hex;
        colorPreview.style.backgroundColor = hex;
        colorValue.textContent = `${hex} · RGB ${rgb.r}, ${rgb.g}, ${rgb.b}`;

        if (shouldSync && canPickColor()) {
            syncStatus({ on: true, mode: 'static', color: currentColor });
        }
    }

    function pickColorFromPoint(clientX, clientY) {
        if (!canPickColor()) {
            return;
        }

        const rect = wheel.getBoundingClientRect();
        const scale = wheel.width / rect.width;
        const x = (clientX - rect.left) * scale;
        const y = (clientY - rect.top) * scale;
        const radius = wheel.width / 2;
        const dx = x - radius;
        const dy = y - radius;
        const distance = Math.sqrt(dx * dx + dy * dy);

        if (distance > radius) {
            return;
        }

        const pixel = ctx.getImageData(Math.round(x), Math.round(y), 1, 1).data;
        const hex = rgbToHex(pixel[0], pixel[1], pixel[2]);
        setSelectorPosition(x / scale, y / scale);
        updateSelectedColor(hex);
    }

    function setMode(mode) {
        currentMode = mode;
        modeButtons.forEach(button => {
            button.classList.toggle('active', button.dataset.mode === mode);
        });

        updateModeControls(mode);

        const update = { on: true, mode };
        if (canPickColor()) {
            update.color = currentColor;
        }
        syncStatus(update);
    }

    function syncStatus(update) {
        fetch(`/status/${device}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(update)
        })
            .then(response => response.json())
            .then(status => applyStatus(status))
            .catch(() => {});
    }

    function applyStatus(status) {
        if (!status) {
            return;
        }

        currentOn = Boolean(status.on);
        onButton.classList.toggle('active', currentOn);
        offButton.classList.toggle('active', !currentOn);

        if (status.mode) {
            currentMode = status.mode;
            modeButtons.forEach(button => {
                button.classList.toggle('active', button.dataset.mode === currentMode);
            });
            updateModeControls(currentMode);
        }

        if (status.color) {
            updateSelectedColor(status.color, false);
            setSelectorFromColor(status.color);
        }

        if (status.brightness !== undefined) {
            dimmerSlider.value = String(status.brightness);
            dimmerValue.textContent = status.brightness + '%';
        }

        if (status.speed !== undefined) {
            speedSlider.value = String(status.speed);
            speedValue.textContent = status.speed + '%';
        }
    }

    function setPower(isOn) {
        syncStatus({ on: isOn });
    }

    function setBrightness(value) {
        if (!usesBrightness(currentMode)) {
            return;
        }

        dimmerValue.textContent = value + '%';
        syncStatus({ on: true, brightness: Number(value) });
    }

    function setSpeed(value) {
        speedValue.textContent = value + '%';
        syncStatus({ on: true, speed: Number(value) });
    }

    drawColorWheel();
    setSelectorPosition(238, 130);
    updateSelectedColor(currentColor, false);
    updateModeControls(currentMode);
    speedSection.setAttribute('aria-hidden', 'true');
    applyStatus({ on: currentOn });

    fetch('/status')
        .then(response => response.json())
        .then(status => applyStatus(status[device]))
        .catch(() => {});

    wheel.addEventListener('pointerdown', function(event) {
        isDragging = true;
        wheel.setPointerCapture(event.pointerId);
        pickColorFromPoint(event.clientX, event.clientY);
    });

    wheel.addEventListener('pointermove', function(event) {
        if (isDragging) {
            pickColorFromPoint(event.clientX, event.clientY);
        }
    });

    wheel.addEventListener('pointerup', function(event) {
        isDragging = false;
        wheel.releasePointerCapture(event.pointerId);
    });

    wheel.addEventListener('pointercancel', function() {
        isDragging = false;
    });

    modeButtons.forEach(button => {
        button.addEventListener('click', function() {
            setMode(this.dataset.mode);
        });
    });

    dimmerSlider.addEventListener('input', function() {
        setBrightness(dimmerSlider.value);
    });

    speedSlider.addEventListener('input', function() {
        setSpeed(speedSlider.value);
    });

    onButton.addEventListener('click', function() {
        setPower(true);
    });

    offButton.addEventListener('click', function() {
        setPower(false);
    });
});
</script>
<script src="{{ url_for('static', filename='touch_sliders.js') }}"></script>

</body>
</html>
